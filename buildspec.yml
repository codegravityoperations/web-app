# buildspec.yml
version: 0.2

env:
  variables:
    S3_BUCKET: "codegravity-frontend-493499579914"
    CLOUDFRONT_DISTRIBUTION_ID: "E39C3TEOSVZ6FJ"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Build started at $(date)"
      - echo "Node version $(node --version)"
      - echo "npm version $(npm --version)"

  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm ci

  build:
    commands:
      - echo "Building React app..."
      - npm run build
      - echo "Build complete. Contents of dist:"
      - ls -la dist/

  post_build:
    commands:
      - echo "Deploying to S3..."
      - aws s3 sync dist/ s3://$S3_BUCKET --delete
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
      - echo "Deployment complete at $(date)"
      - echo "Site live at https://$(aws cloudfront get-distribution --id $CLOUDFRONT_DISTRIBUTION_ID --query 'Distribution.DomainName' --output text)"

artifacts:
  files:
    - "**/*"
  base-directory: dist